name: GitHub Actions Demo
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀

on: 
  workflow_call:
    inputs:
      logLevel:
        type: string
        required: true
        default: 'warning'
      print_tags:
        description: 'True to print to STDOUT'
        required: true
        type: string
      tags:
        description: 'Test scenario tags'
        required: true
        type: number
        default: 0
    outputs:
      firstword:
        description: "The first output string"
        value: ${{ jobs.Explore-GitHub-Actions.outputs.output1 }}

permissions:
  contents: read
  pull-requests: read

jobs:
  Explore-GitHub-Actions:
    runs-on: ubuntu-latest
    outputs:
      output1: ${{ steps.step1.outputs.firstword }}

    steps:
      - id: step1
        run: |
          echo "🎉 Triggered with logLevel: ${{ inputs.logLevel }}"
          echo "firstword=hello" >> $GITHUB_OUTPUT

      - name: Print GitHub Context
        run: |
          echo "Event Name : ${{ github.event_name }}"
          echo "Ref        : ${{ github.ref }}"
          echo "Ref Name   : ${{ github.ref_name }}"
          echo "Head Ref   : ${{ github.head_ref }}"
          echo "Base Ref   : ${{ github.base_ref }}"
          echo "Repository : ${{ github.repository }}"
          echo "Owner      : ${{ github.repository_owner }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect PR via REST API
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          set -x

          REPO="${{ github.repository }}"
          OWNER="${{ github.repository_owner }}"
          BRANCH="${{ github.head_ref || github.ref_name }}"

          echo "Checking branch: $BRANCH"

          PR_NUMBER=""
          PR_BASE=""

          # Case 1: Native PR event
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "Native pull_request event detected."
            PR_NUMBER="${{ github.event.pull_request.number }}"
            PR_BASE="${{ github.base_ref }}"
          else
            echo "Not a PR event. Checking open PRs via REST..."

            PR_DATA=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/pulls?head=${OWNER}:${BRANCH}&state=open")

            echo "Raw PR_DATA:"
            echo "$PR_DATA"

            PR_COUNT=$(echo "$PR_DATA" | jq 'length')
            echo "PR_COUNT: $PR_COUNT"

            if [[ "$PR_COUNT" -gt 0 ]]; then
              PR_NUMBER=$(echo "$PR_DATA" | jq -r '.[0].number')
              PR_BASE=$(echo "$PR_DATA" | jq -r '.[0].base.ref')
            fi
          fi

          echo "--------------------------------------"
          if [[ -n "$PR_NUMBER" ]]; then
            echo "✅ Open PR Found"
            echo "PR Number : $PR_NUMBER"
            echo "Base Branch: $PR_BASE"
          else
            echo "❌ No Open PR Found"
          fi
          echo "--------------------------------------"

      - name: Final Status
        run: echo "🍏 Job status is ${{ job.status }}"
